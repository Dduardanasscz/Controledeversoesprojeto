<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingressos - Expofesta Paulistana 2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="ingressos.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>ExpoFest <span>2026</span></h1>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="atracoes.html">Atrações</a></li>
                <li><a href="ingressos.html" class="active">Ingressos</a></li>
            </ul>
        </nav>
    </header>

    <section class="ingressos-hero">
        <div class="hero-container">
            <h2>Ingressos Oficiais</h2>
            <p>Garanta o seu passaporte antecipado para o evento.</p>
        </div>
    </section>

    <section class="cards-section">
        <div class="cards-container">

            <div class="ticket-card">
                <div class="card-header">
                    <h3>Meia-Entrada</h3>
                </div>

                <div class="card-price">
                    <span class="currency">R$</span><span class="price-value">30</span>
                </div>

                <button class="btn-comprar">Comprar ingresso</button>
            </div>

            <div class="ticket-card featured">
                <div class="card-header">
                    <h3>Pista Inteira</h3>
                </div>

                <div class="card-price">
                    <span class="currency">R$</span><span class="price-value">60</span>
                </div>

                <button class="btn-comprar">Comprar ingresso</button>
            </div>

            <div class="ticket-card vip">
                <div class="card-header">
                    <h3>Premium VIP</h3>
                </div>

                <div class="card-price">
                    <span class="currency">R$</span><span class="price-value">150</span>
                </div>

                <button class="btn-comprar">Comprar ingresso</button>
            </div>

        </div>
    </section>

    <section id="informacoes" class="info-section">
        <h2>Informações</h2>
    </section>

    <section class="faq-section">
        <h2>FAQ</h2>
    </section>

    <footer>
        <p>© 2026 ExpoFest</p>
    </footer>

</body>
</html>
